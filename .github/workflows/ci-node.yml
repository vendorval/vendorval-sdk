name: CI (Node)

on:
  push:
    branches: [main]
    paths:
      - "packages/node/**"
      - "specs/**"
      - ".github/workflows/ci-node.yml"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
  pull_request:

# Cancel superseded in-progress runs on the same PR; never cancel main.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter vendorval-sdk typecheck
      - run: pnpm --filter vendorval-sdk test
      - run: pnpm --filter vendorval-sdk build
