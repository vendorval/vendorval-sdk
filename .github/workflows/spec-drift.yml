name: Spec drift

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Sync openapi.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-openapi.mjs
      - name: Open PR if changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(specs): sync openapi.json from upstream"
          branch: chore/sync-openapi
          title: "chore(specs): sync openapi.json from upstream"
          body: |
            Automated sync of `specs/openapi.json` from the latest upstream VendorVal API release.

            Review the diff to see if the SDK surface needs updating.
          labels: spec-sync,automated
